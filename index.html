<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Stopwatch</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6bb0e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kids Timer">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="app">
    <!-- Timers View -->
    <div id="timers-view" class="view active">
      <div class="header">
        <h1>Kids Stopwatch</h1>
        <div class="gem-bar" id="gem-bar"></div>
      </div>
      <div class="stopwatch-container" id="stopwatch-container"></div>
    </div>

    <!-- History View -->
    <div id="history-view" class="view">
      <div class="header">
        <h1>History</h1>
      </div>
      <div class="history-content">
        <section class="history-section">
          <h2 class="section-header">This Week</h2>
          <div class="weekly-grid" id="weekly-grid"></div>
        </section>
        <section class="history-section">
          <h2 class="section-header">History</h2>
          <div class="history-list" id="history-list"></div>
        </section>
      </div>
    </div>

    <!-- Achievements View -->
    <div id="achievements-view" class="view">
      <div class="header">
        <h1>Achievements</h1>
        <p class="subtitle">Earn gems and redeem them for streak freezes</p>
      </div>
      <div id="achievements-content"></div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="timers">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Timers</span>
      </button>
      <button class="tab" data-tab="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span>History</span>
      </button>
      <button class="tab" data-tab="achievements">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7"/>
          <path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>
        <span>Achievements</span>
      </button>
    </nav>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/stopwatch.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
